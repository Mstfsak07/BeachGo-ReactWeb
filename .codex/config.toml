[orchestrator]
default_mode = "dry-run"
max_phase_retries = 3
planner_executor = "local"
workspace_write_enforced = true
state_dir = "ops/state"
prompt_dir = "ops/prompts"
log_dir = "ops/state/logs"
default_assessment_file = "C:/Users/akMuratNET/Desktop/Beachgo-Claude-inceleme.txt"
state_summary_limit = 3
planner_timeout_seconds = 45
executor_timeout_seconds = 180
verification_timeout_seconds = 900

[availability]
claude_enabled = false
gemini_primary = true

[model_policy]
default = "gpt-5.4-mini"
code_execution = "gpt-5.3-codex"
escalation = "gpt-5.4"
small_tasks_use_large_model = false
same_phase_repeat_large_model = false
mini_first = true
gemini_micro = "gemini-3.1-flash-lite"
gemini_default = "gemini-3-flash"
gemini_agent = "gemini-3-flash-agent"
gemini_escalation = "gemini-3-flash-agent"

[executors.claude]
command = ["claude", "--dangerously-skip-permissions", "-p", "{prompt}"]

[executors.gemini]
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "ops/run_gemini.ps1", "-Model", "{model}", "-PromptFile", "{prompt_file}"]
