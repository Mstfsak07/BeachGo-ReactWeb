name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BeachRehberi.API/BeachRehberi.API
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore and test
        run: |
          dotnet restore BeachRehberi.API.sln
          dotnet test BeachRehberi.API.sln --no-restore --verbosity minimal
      - name: Build
        run: dotnet build BeachRehberi.API.sln --no-restore -c Release

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: beach-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: beach-ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
